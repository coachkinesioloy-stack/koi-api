<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANNA Coach</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-parallax" id="bgParallax">
    <div class="bg-breath"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <svg class="bg-lines" viewBox="0 0 1600 1100" preserveAspectRatio="none">
      <defs>
        <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(212,175,55,0)"/>
          <stop offset="50%" stop-color="rgba(212,175,55,.16)"/>
          <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
        </linearGradient>
        <linearGradient id="cyanLine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(132,219,230,0)"/>
          <stop offset="50%" stop-color="rgba(132,219,230,.11)"/>
          <stop offset="100%" stop-color="rgba(132,219,230,0)"/>
        </linearGradient>
      </defs>

      <path class="bg-line g1" d="M0,180 C220,120 340,280 540,240 C760,200 920,80 1110,120 C1300,160 1420,280 1600,240" />
      <path class="bg-line c1" d="M0,360 C220,310 410,470 640,420 C860,370 1010,260 1230,300 C1450,340 1530,450 1600,430" />
      <path class="bg-line g2" d="M0,600 C170,520 390,720 620,650 C850,580 1020,480 1260,520 C1450,550 1540,650 1600,620" />
      <path class="bg-line c2" d="M0,860 C180,790 380,950 620,900 C880,850 1110,730 1340,770 C1490,790 1560,840 1600,830" />
    </svg>
  </div>

  <div class="app">
    <aside class="sidebar glass reveal">
      <div>
        <div class="brand">
          <img src="./assets/logo.png" alt="HANNA" class="brand-logo" />
          <div class="brand-copy">
            <h1>HANNA</h1>
            <p>Coach Platform</p>
          </div>
        </div>

        <nav class="side-nav">
          <button class="side-link active" data-view="dashboard">INICIO</button>
          <button class="side-link" data-view="patients">PACIENTES</button>
          <button class="side-link" data-view="sessions">SESIONES</button>
          <button class="side-link" data-view="checkin">EVALUACIONES</button>
          <button class="side-link" data-view="planning">PLANIFICACIÓN</button>
          <button class="side-link" data-view="library">BIBLIOTECA</button>
          <button class="side-link" data-view="community">COMUNIDAD</button>
          <button class="side-link" data-view="tips">TIPS</button>
          <button class="side-link" data-view="live">SESIÓN EN VIVO</button>
          <button class="side-link" data-view="settings">CONFIGURACIÓN</button>
        </nav>
      </div>

      <div class="side-footer">
        <div class="side-line"></div>
        <p>Precision · Luxury Health · Neuro-adaptation</p>
      </div>
    </aside>

    <main class="main">
      <header class="top-header glass reveal">
        <div class="top-left">
          <div class="header-eyebrow">HANNA COACH</div>
          <h2 id="pageTitle">Dashboard clínico</h2>
          <p id="pageSubtitle">Control integral del sistema.</p>
        </div>

        <div class="top-right">
          <div class="active-patient-box glass-soft">
            <div class="active-label">Paciente activo</div>
            <div class="active-name" id="activePatientName">Sin seleccionar</div>
            <div class="active-meta" id="activePatientMeta">Seleccioná un paciente para trabajar.</div>
          </div>

          <div class="mini-status glass-soft">
            <span class="status-dot"></span>
            <div>
              <strong>Sistema operativo</strong>
              <span>API conectada</span>
            </div>
          </div>
        </div>
      </header>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-patients" class="view"></section>
      <section id="view-sessions" class="view"></section>
      <section id="view-checkin" class="view"></section>
      <section id="view-planning" class="view"></section>
      <section id="view-library" class="view"></section>
      <section id="view-community" class="view"></section>
      <section id="view-tips" class="view"></section>
      <section id="view-live" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
