<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HANNA</title>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0a1a2f, #050b14);
  color: white;
}

/* layout */
.app {
  display: flex;
  height: 100vh;
}

/* sidebar */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.05);
  padding: 30px;
}

/* logo */
.logo {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(90deg,#d4af37,#8fd3f4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* nav */
.nav {
  margin-top: 40px;
}

.nav button {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  border: none;
  background: transparent;
  color: #8aa0b5;
  text-align: left;
  border-radius: 10px;
  cursor: pointer;
}

.nav button:hover {
  background: rgba(255,255,255,0.05);
  color: white;
}

/* main */
.main {
  flex:1;
  padding:40px;
}

/* cards */
.card {
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
  backdrop-filter: blur(15px);
}

/* grid */
.grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:20px;
}

/* metrics */
.metric {
  font-size:40px;
  font-weight:700;
}

/* input */
input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#0a1a2f;
  color:white;
}

/* button */
.btn {
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#d4af37,#8fd3f4);
  color:black;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">HANNA</div>

    <div class="nav">
      <button onclick="dashboard()">Dashboard</button>
      <button onclick="patients()">Pacientes</button>
      <button onclick="session()">Sesión</button>
      <button onclick="checkin()">Evaluación</button>
    </div>
  </div>

  <div class="main" id="content"></div>

</div>

<script>

const API = "https://hanna-api-9rub.onrender.com"

function dashboard() {
  content.innerHTML = `
    <h1>Overview</h1>

    <div class="grid">
      <div class="card">
        <div class="metric" id="pCount">-</div>
        Pacientes
      </div>

      <div class="card">
        <div class="metric" id="sCount">-</div>
        Sesiones
      </div>

      <div class="card">
        <div class="metric" id="cCount">-</div>
        Check-ins
      </div>
    </div>
  `

  fetch(API+"/dashboard/summary")
    .then(r=>r.json())
    .then(d=>{
      pCount.innerText = d.patients_count
      sCount.innerText = d.sessions_count
      cCount.innerText = d.checkins_count
    })
}

function patients() {
  content.innerHTML = `
    <div class="card">
      <h2>Nuevo paciente</h2>
      <input id="name" placeholder="Nombre"/>
      <button class="btn" onclick="createPatient()">Guardar</button>
      <pre id="out"></pre>
    </div>
  `
}

function session() {
  content.innerHTML = `
    <div class="card">
      <h2>Crear sesión</h2>
      <input id="patientId" placeholder="patient_id"/>
      <button class="btn" onclick="createSession()">Crear</button>
      <pre id="out"></pre>
    </div>
  `
}

function checkin() {
  content.innerHTML = `
    <div class="card">
      <h2>Check-in</h2>
      <button class="btn" onclick="sendCheckin()">Enviar</button>
      <pre id="out"></pre>
    </div>
  `
}

function createPatient() {
  const name = document.getElementById("name").value

  fetch(API+"/patient?name="+name,{method:"POST"})
  .then(r=>r.json())
  .then(d=> out.innerText = JSON.stringify(d,null,2))
}

function createSession() {
  const patientId = document.getElementById("patientId").value

  fetch(API+"/session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({patient_id:patientId})
  })
  .then(r=>r.json())
  .then(d=> out.innerText = JSON.stringify(d,null,2))
}

function sendCheckin() {
  const payload = {
    session_id: "test",
    patient_id: "test",
    type: "M1_MEASURED",
    actor: "system",
    schema_name: "biometric_checkin",
    schema_version: "1",
    payload: { rmssd_ms: 20 }
  }

  fetch(API+"/event",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  })
  .then(r=>r.json())
  .then(d=> out.innerText = JSON.stringify(d,null,2))
}

dashboard()

</script>

</body>
</html>
