<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANNA</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-bg">
    <div class="network"></div>
    <div class="network network-2"></div>
    <div class="halo halo-1"></div>
    <div class="halo halo-2"></div>
  </div>

  <div class="shell">
    <aside class="sidebar glass">
      <div class="brand">
        <div class="brand-pulse">
          <span></span>
        </div>
        <div class="brand-copy">
          <h1>HANNA</h1>
          <p>Pure. Precise.</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">Overview</button>
        <button class="nav-btn" data-view="patients">Patients</button>
        <button class="nav-btn" data-view="sessions">Sessions</button>
        <button class="nav-btn" data-view="checkin">Evaluation</button>
      </nav>

      <div class="sidebar-foot">
        <div class="sidebar-foot-line"></div>
        <p>Heart-rate · Anatomical · Neuro-immune · Adaptation</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar glass">
        <div class="topbar-left">
          <div class="mini-logo">
            <span class="mini-logo-line"></span>
          </div>
          <div>
            <div class="eyebrow">System ready</div>
            <h2 id="page-title">Good evening</h2>
            <p id="page-subtitle">The path of adaptation.</p>
          </div>
        </div>

        <div class="topbar-right">
          <div class="api-box">
            <label>API</label>
            <input id="apiBase" value="https://hanna-api-9rub.onrender.com" />
          </div>

          <div class="profile-chip glass-soft">
            <div class="profile-dot"></div>
            <div>
              <strong>Licenciado</strong>
              <span>Elite Coaching</span>
            </div>
          </div>
        </div>
      </header>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-patients" class="view"></section>
      <section id="view-sessions" class="view"></section>
      <section id="view-checkin" class="view"></section>

      <button id="floating-action" class="floating-action">
        <span class="floating-glow"></span>
        <span>Start Coaching Session</span>
      </button>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
