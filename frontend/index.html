<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANNA Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>HANNA</h1>
          <p>Health Adaptive Network</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-link active" data-view="dashboard">Dashboard</button>
        <button class="nav-link" data-view="patients">Pacientes</button>
        <button class="nav-link" data-view="sessions">Sesiones</button>
        <button class="nav-link" data-view="checkin">Evaluación M1</button>
      </nav>

      <div class="sidebar-footer">
        <p>Versión piloto</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="view-title">Dashboard</h2>
          <p id="view-subtitle">Resumen operativo de HANNA</p>
        </div>
        <div class="api-box">
          <label>API</label>
          <input id="apiBase" value="https://hanna-api-9rub.onrender.com" />
        </div>
      </header>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-patients" class="view"></section>
      <section id="view-sessions" class="view"></section>
      <section id="view-checkin" class="view"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
